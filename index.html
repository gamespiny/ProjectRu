      </div>
      <div className="stat-blk">
        <div className="stat-blk-title">🔧 По статусам</div>
        {Object.entries(REPAIR_STATUS).map(([k,v])=><div key={k} className="stat-line">
          <span className="stat-ln-lbl">{v.icon} {v.label}</span><span className="stat-ln-val">{byStatus[k]||0}</span>
        </div>)}
        {Object.keys(bySource).length>0&&<>
          <div className="stat-blk-title" style={{marginTop:'12px'}}>📍 Источники</div>
          {Object.entries(bySource).map(([src,cnt])=><div key={src} className="stat-line">
            <span className="stat-ln-lbl">{src}</span><span className="stat-ln-val">{cnt}</span>
          </div>)}
        </>}
      </div>
    </div>
    {Object.values(byService).some(v=>v>0)&&<div className="stat-blk" style={{marginTop:'14px'}}>
      <div className="stat-blk-title">💼 По услугам</div>
      {Object.entries(byService).filter(([_,c])=>c>0).map(([s,c])=><div key={s} className="stat-line">
        <span className="stat-ln-lbl">{s}</span><span className="stat-ln-val">{c}</span>
      </div>)}
    </div>}
  </>;
}

function RepairModal({data,upd,init,close}){
  const e=init.edit||null;
  const[service,setService]=React.useState(e?.service||REPAIR_SERVICES[0]);
  const[cn,setCn]=React.useState(e?.console||CONSOLES[0]);
  const[cnCustom,setCnCustom]=React.useState('');
  const[sn,setSn]=React.useState(e?.serialNumber||'');
  const[income,setIncome]=React.useState(e?.income||'');
  const[expenses,setExpenses]=React.useState(e?.expenses||'');
  const[addIncome,setAddIncome]=React.useState(e?.additionalIncome||'');
  const[addIncomeNote,setAddIncomeNote]=React.useState(e?.additionalIncomeNote||'');
  const[urgent,setUrgent]=React.useState(e?.urgent||false);
  const[status,setStatus]=React.useState(e?.status||'pending');
  const[clientName,setClientName]=React.useState(e?.clientName||'');
  const[clientPhone,setClientPhone]=React.useState(e?.clientPhone||'');
  const[clientSource,setClientSource]=React.useState(e?.clientSource||CLIENT_SOURCES[0]);
  const[clientLink,setClientLink]=React.useState(e?.clientLink||'');
  const[dateReceived,setDateReceived]=React.useState(e?.dateReceived||todayStr());
  const[dateDeadline,setDateDeadline]=React.useState(e?.dateDeadline||todayStr());
  const[dateCompleted,setDateCompleted]=React.useState(e?.dateCompleted||'');
  const[payMethod,setPayMethod]=React.useState(e?.paymentMethod||'Наличные');
  const[deductions,setDeductions]=React.useState(e?.deductions?.toString()||'');
  const[adCost,setAdCost]=React.useState(e?.adCost?.toString()||'');
  const[notes,setNotes]=React.useState(e?.notes||'');
  
  // Автозаполнение даты возврата = дате приёмки (только для новых заказов)
  React.useEffect(()=>{
    if(!e&&dateReceived&&!dateCompleted){
      setDateCompleted(dateReceived);
    }
  },[dateReceived]);
  
  // Автозаполнение отчислений 4% для карты
  React.useEffect(()=>{
    if(payMethod==='Карта/Перевод'&&income){
      const totalIncome=(parseFloat(income)||0)+(parseFloat(addIncome)||0);
      setDeductions((totalIncome*0.04).toFixed(0));
    }else if(payMethod!=='Карта/Перевод'){
      setDeductions('0');
    }
  },[payMethod,income,addIncome]);
  
  const save=()=>{
    const finalCn=cn==='Другая консоль'?cnCustom:cn;
    if(!finalCn.trim()||!income)return;
    const repairData={
      service,console:finalCn,serialNumber:sn,
      income:parseFloat(income),expenses:parseFloat(expenses)||0,
      additionalIncome:parseFloat(addIncome)||0,additionalIncomeNote:addIncomeNote,
      adCost:parseFloat(adCost)||0,
      urgent,status,clientName,clientPhone,clientSource,clientLink,
      dateReceived,dateDeadline,dateCompleted,
      paymentMethod:payMethod,deductions:parseFloat(deductions)||0,notes,
      date:dateReceived,createdAt:e?.createdAt||new Date().toISOString()
    };
    if(e){
      upd(d=>{const r=d.repairs.find(x=>x.id===e.id);if(r)Object.assign(r,repairData);return d;});
    }else{
      upd(d=>{if(!d.repairs)d.repairs=[];d.repairs.push({id:uid(),...repairData});return d;});
    }
    close();
  };
  
  return<div className="ov">
    <div className="modal" style={{maxWidth:'640px'}}>
      <div className="modal-hdr"><div className="modal-title">{e?'Редактировать заказ':'Новый заказ'}</div><button className="modal-x" onClick={close}>✕</button></div>
      <div className="modal-body">
        <div className="fr-2">
          <div className="fr"><label>Услуга</label>
            <select value={service} onChange={ev=>setService(ev.target.value)}>{REPAIR_SERVICES.map(s=><option key={s}>{s}</option>)}</select></div>
          <div className="fr"><label>Консоль</label>
            <select value={cn} onChange={ev=>setCn(ev.target.value)}>{CONSOLES.map(c=><option key={c}>{c}</option>)}</select></div>
        </div>
        {cn==='Другая консоль'&&<div className="fr"><label>Название консоли</label><input value={cnCustom} onChange={ev=>setCnCustom(ev.target.value)} placeholder="Steam Deck, PS5..."/></div>}
        <div className="fr"><label>Серийный номер</label><input value={sn} onChange={ev=>setSn(ev.target.value)} placeholder="XAW70123456"/></div>
        <div className="fr-3">
          <div className="fr"><label>Доход ₽</label><input type="number" value={income} onChange={ev=>setIncome(ev.target.value)} placeholder="4000"/></div>
          <div className="fr"><label>Затраты ₽</label><input type="number" value={expenses} onChange={ev=>setExpenses(ev.target.value)} placeholder="500"/></div>
          <div className="fr"><label>Доп. доход ₽</label><input type="number" value={addIncome} onChange={ev=>setAddIncome(ev.target.value)} placeholder="0"/></div>
        </div>
        {addIncome>0&&<div className="fr"><label>За что доп. доход?</label><input value={addIncomeNote} onChange={ev=>setAddIncomeNote(ev.target.value)} placeholder="Доставка, срочность..."/></div>}
        <div className="fr-2">
          <div className="fr"><label>Клиент</label><input value={clientName} onChange={ev=>setClientName(ev.target.value)} placeholder="Иван Петров"/></div>
          <div className="fr"><label>Телефон</label><input value={clientPhone} onChange={ev=>setClientPhone(ev.target.value)} placeholder="+7 999 123-45-67"/></div>
        </div>
        <div className="fr-2">
          <div className="fr"><label>Источник клиента</label>
            <select value={clientSource} onChange={ev=>setClientSource(ev.target.value)}>{CLIENT_SOURCES.map(s=><option key={s}>{s}</option>)}</select></div>
          <div className="fr"><label>Ссылка на диалог</label><input value={clientLink} onChange={ev=>setClientLink(ev.target.value)} placeholder="https://avito.ru/диалог..."/></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px',marginBottom:'12px'}}>
          <div className="fr" style={{marginBottom:0}}><label>Принято</label><input type="date" value={dateReceived} onChange={ev=>setDateReceived(ev.target.value)}/></div>
          <div className="fr" style={{marginBottom:0}}><label>Дата возврата</label><input type="date" value={dateCompleted} onChange={ev=>setDateCompleted(ev.target.value)}/></div>
          <div className="fr" style={{marginBottom:0}}><label>Статус</label>
            <select value={status} onChange={ev=>setStatus(ev.target.value)}>
              {Object.entries(REPAIR_STATUS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
            </select></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr auto',gap:'12px',alignItems:'end',marginBottom:'12px'}}>
          <div className="fr" style={{marginBottom:0}}><label>Оплата</label>
            <select value={payMethod} onChange={ev=>setPayMethod(ev.target.value)}>{PAYMENT_REPAIR.map(p=><option key={p}>{p}</option>)}</select></div>
          <div className="fr" style={{marginBottom:0}}><label>Отчисления ₽</label><input type="number" value={deductions} onChange={ev=>setDeductions(ev.target.value)} placeholder="0"/></div>
          <label className="check-row" style={{paddingBottom:'8px'}}><input type="checkbox" checked={urgent} onChange={ev=>setUrgent(ev.target.checked)}/><span>⚡ Срочно</span></label>
        </div>
        <div className="fr" style={{marginBottom:0}}><label>Комментарий</label>
          <textarea value={notes} onChange={ev=>setNotes(ev.target.value)} placeholder="Особенности, состояние..."/></div>
      </div>
      <div className="modal-footer">
        <button className="btn btn-g" onClick={close}>Отмена</button>
        <button className="btn btn-a" onClick={save}>Сохранить</button>
      </div>
    </div>
  </div>;
}

function TotalTab({data}){
  const[period,setPeriod]=React.useState('month');
  const[selYear,setSelYear]=React.useState(todayStr().slice(0,4));
  const[selMonth,setSelMonth]=React.useState(mKey(todayStr()));

  const allSaleMonths=useMemo(()=>[...new Set(data.sales.map(s=>mKey(s.date)).filter(Boolean))].sort().reverse(),[data.sales]);
  const allRepairMonths=useMemo(()=>[...new Set((data.repairs||[]).map(r=>mKey(r.dateCompleted||r.date)).filter(Boolean))].sort().reverse(),[data.repairs]);
  const allMonths=useMemo(()=>[...new Set([...allSaleMonths,...allRepairMonths])].sort().reverse(),[allSaleMonths,allRepairMonths]);
  const allYears=useMemo(()=>[...new Set(allMonths.map(m=>m.split('-')[0]))].sort().reverse(),[allMonths]);

  // Фильтрация перепродажи
  const filtSales=useMemo(()=>{
    if(period==='month')return data.sales.filter(s=>mKey(s.date)===selMonth);
    if(period==='year')return data.sales.filter(s=>(s.date||'').startsWith(selYear));
    return data.sales;
  },[data.sales,period,selMonth,selYear]);

  const filtLotIds=useMemo(()=>new Set(filtSales.map(s=>s.lotId)),[filtSales]);
  const filtLots=useMemo(()=>data.lots.filter(l=>filtLotIds.has(l.id)),[data.lots,filtLotIds]);
  const resaleRevenue=filtSales.reduce((s,x)=>s+(x.amount||0),0);
  const resaleInvested=filtLots.reduce((s,l)=>s+(l.cost||0),0);
  const resalePromo=filtSales.reduce((s,x)=>s+(x.promoCost||0),0);
  const resaleProfit=resaleRevenue-resaleInvested-resalePromo;

  // Фильтрация ремонта
  const filtRepairs=useMemo(()=>{
    const repairs=data.repairs||[];
    if(period==='month')return repairs.filter(r=>mKey(r.dateCompleted||r.date)===selMonth);
    if(period==='year')return repairs.filter(r=>(r.dateCompleted||r.date||'').startsWith(selYear));
    return repairs;
  },[data.repairs,period,selMonth,selYear]);

  // Реклама ремонта
  const filtAds=(data.adBudgets||[]).filter(a=>{
    if(period==='month')return a.month===selMonth;
    if(period==='year')return a.month.startsWith(selYear);
    return true;
  });
  const repairAdCost=filtAds.reduce((s,a)=>s+(a.amount||0),0);
  const repairIncome=filtRepairs.reduce((s,r)=>s+(r.income||0)+(r.additionalIncome||0),0);
  const repairExpenses=filtRepairs.reduce((s,r)=>s+(r.expenses||0),0);
  const repairDeductions=filtRepairs.reduce((s,r)=>s+(r.deductions||0),0);
  const repairProfit=repairIncome-repairExpenses-repairDeductions-repairAdCost;

  const totalProfit=resaleProfit+repairProfit;
  const totalRevenue=resaleRevenue+repairIncome;

  const periodLabel=period==='month'?(()=>{const[y,mo]=selMonth.split('-');return MONTHS_FULL[parseInt(mo)-1]+' '+y;})():period==='year'?selYear+' год':'За всё время';

  return<>
    <div style={{display:'flex',gap:'8px',marginBottom:'18px',flexWrap:'wrap',alignItems:'center'}}>
      <div style={{display:'flex',gap:'4px',background:'var(--surf2)',padding:'3px',borderRadius:'8px'}}>
        {[['month','Месяц'],['year','Год'],['all','Всё время']].map(([k,l])=>(
          <button key={k} onClick={()=>setPeriod(k)} style={{padding:'5px 14px',background:period===k?'var(--surf3)':'transparent',border:'none',borderRadius:'6px',color:period===k?'var(--text)':'var(--t3)',fontSize:'.78rem',fontWeight:600,cursor:'pointer',fontFamily:'var(--sans)'}}>{l}</button>
        ))}
      </div>
      {period==='year'&&<select className="sel-sm" value={selYear} onChange={e=>setSelYear(e.target.value)}>
        {allYears.map(y=><option key={y} value={y}>{y} год</option>)}
      </select>}
      {period==='month'&&<select className="sel-sm" value={selMonth} onChange={e=>setSelMonth(e.target.value)}>
        {allMonths.map(m=>{const[y,mo]=m.split('-');return<option key={m} value={m}>{MONTHS_FULL[parseInt(mo)-1]} {y}</option>;})}
      </select>}
      <span style={{fontSize:'.82rem',color:'var(--t3)',marginLeft:'4px'}}>{periodLabel}</span>
    </div>

    {/* Общий итог */}
    <div style={{background:'linear-gradient(135deg,rgba(16,185,129,.12),rgba(79,184,255,.08))',border:'1px solid rgba(16,185,129,.25)',borderRadius:'var(--r2)',padding:'20px 24px',marginBottom:'16px',textAlign:'center'}}>
      <div style={{fontSize:'.75rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',color:'var(--t3)',marginBottom:'10px'}}>🏆 Общая прибыль</div>
      <div style={{fontFamily:'var(--mono)',fontSize:'2.4rem',fontWeight:700,color:totalProfit>=0?'var(--accent)':'var(--red)'}}>{(totalProfit>=0?'+':'')+fmt(totalProfit)}</div>
      <div style={{fontSize:'.82rem',color:'var(--t3)',marginTop:'6px'}}>Общий доход: {fmt(totalRevenue)}</div>
    </div>

    {/* Две колонки: перепродажа и ремонт */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginBottom:'16px'}}>
      <div style={{background:'var(--surf)',border:'1px solid var(--border)',borderRadius:'var(--r2)',padding:'16px'}}>
        <div style={{fontSize:'.75rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.8px',color:'var(--t3)',marginBottom:'12px'}}>💼 Перепродажа</div>
        {[['Прибыль',(resaleProfit>=0?'+':'')+fmt(resaleProfit),resaleProfit>=0?'var(--accent)':'var(--red)'],
          ['Выручка / Доход',fmt(resaleRevenue),'var(--a3)'],
          ['Вложено / Затраты',fmt(resaleInvested),'var(--a2)'],
          ['Продвижение',resalePromo>0?'−'+fmt(resalePromo):'—','var(--warn)'],
          ['Сделок',filtSales.length,'var(--text)'],
        ].map(([l,v,c])=><div key={l} className="stat-line"><span className="stat-ln-lbl">{l}</span><span className="stat-ln-val" style={{color:c}}>{v}</span></div>)}
      </div>
      <div style={{background:'var(--surf)',border:'1px solid var(--border)',borderRadius:'var(--r2)',padding:'16px'}}>
        <div style={{fontSize:'.75rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.8px',color:'var(--t3)',marginBottom:'12px'}}>🔧 Ремонт</div>
        {[['Прибыль',(repairProfit>=0?'+':'')+fmt(repairProfit),repairProfit>=0?'var(--accent)':'var(--red)'],
          ['Выручка / Доход',fmt(repairIncome),'var(--a3)'],
          ['Вложено / Затраты',fmt(repairExpenses),'var(--a2)'],
          ['Отчисления',fmt(repairDeductions),'var(--warn)'],
          ['Продвижение / Реклама',repairAdCost>0?'−'+fmt(repairAdCost):'—','var(--warn)'],
          ['Заказов',filtRepairs.length,'var(--text)'],
        ].map(([l,v,c])=><div key={l} className="stat-line"><span className="stat-ln-lbl">{l}</span><span className="stat-ln-val" style={{color:c}}>{v}</span></div>)}
      </div>
    </div>

    {/* Доля источников */}
    {totalProfit!==0&&<div style={{background:'var(--surf)',border:'1px solid var(--border)',borderRadius:'var(--r2)',padding:'14px 16px'}}>
      <div style={{fontSize:'.75rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.8px',color:'var(--t3)',marginBottom:'10px'}}>📊 Распределение прибыли</div>
      <div style={{display:'flex',gap:'0',height:'12px',borderRadius:'6px',overflow:'hidden',marginBottom:'10px'}}>
        {totalProfit>0&&resaleProfit>0&&<div style={{flex:resaleProfit/totalProfit,background:'var(--accent)',transition:'flex .3s'}}/>}
        {totalProfit>0&&repairProfit>0&&<div style={{flex:repairProfit/totalProfit,background:'var(--a3)',transition:'flex .3s'}}/>}
      </div>
      <div style={{display:'flex',gap:'16px',fontSize:'.8rem'}}>
        <div style={{display:'flex',alignItems:'center',gap:'6px'}}><div style={{width:'10px',height:'10px',borderRadius:'3px',background:'var(--accent)'}}/><span style={{color:'var(--t2)'}}>Перепродажа {totalProfit>0?(resaleProfit/totalProfit*100).toFixed(0):0}%</span></div>
        <div style={{display:'flex',alignItems:'center',gap:'6px'}}><div style={{width:'10px',height:'10px',borderRadius:'3px',background:'var(--a3)'}}/><span style={{color:'var(--t2)'}}>Ремонт {totalProfit>0?(repairProfit/totalProfit*100).toFixed(0):0}%</span></div>
      </div>
    </div>}
  </>;
}

function RepairAdsTab({data,upd,fMonth}){
  const[showForm,setShowForm]=React.useState(false);
  const[adMonth,setAdMonth]=React.useState(fMonth||mKey(todayStr()));
  const[adType,setAdType]=React.useState('promotion'); // posting | promotion
  const[adAmount,setAdAmount]=React.useState('');
  const[adNote,setAdNote]=React.useState('');

  const allRepairMonths=useMemo(()=>{
    const ms=(data.repairs||[]).map(r=>mKey(r.dateCompleted||r.date)).filter(Boolean);
    const cur=mKey(todayStr());
    return[...new Set([...ms,cur])].sort().reverse();
  },[data.repairs]);

  const ads=(data.adBudgets||[]).sort((a,b)=>b.month.localeCompare(a.month)||b.createdAt?.localeCompare(a.createdAt||'')||0);

  const totalPosting=ads.filter(a=>a.type==='posting').reduce((s,a)=>s+(a.amount||0),0);
  const totalPromotion=ads.filter(a=>a.type==='promotion').reduce((s,a)=>s+(a.amount||0),0);
  const totalAll=totalPosting+totalPromotion;

  const save=()=>{
    if(!adAmount||!adMonth)return;
    upd(d=>{
      if(!d.adBudgets)d.adBudgets=[];
      d.adBudgets.push({id:uid(),month:adMonth,type:adType,amount:parseFloat(adAmount),note:adNote,createdAt:new Date().toISOString()});
      return d;
    });
    setAdAmount('');setAdNote('');setShowForm(false);
  };

  const delAd=id=>upd(d=>{d.adBudgets=d.adBudgets.filter(a=>a.id!==id);return d;});

  return<>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'10px',marginBottom:'20px'}}>
      {[['Всего расходов','−'+fmt(totalAll),'var(--a2)'],
        ['Оплата объявлений','−'+fmt(totalPosting),'var(--warn)'],
        ['Продвижение','−'+fmt(totalPromotion),'var(--warn)'],
      ].map(([l,v,c])=><div key={l} style={{background:'var(--surf)',border:'1px solid var(--border)',borderRadius:'var(--r2)',padding:'14px 16px'}}>
        <div style={{fontSize:'.7rem',color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.8px',fontWeight:700,marginBottom:'7px'}}>{l}</div>
        <div style={{fontFamily:'var(--mono)',fontSize:'1.3rem',fontWeight:700,color:c}}>{v}</div>
      </div>)}
    </div>

    <div className="sec-hdr">
      <span className="sec-title">Расходы на рекламу</span>
      <button className="btn btn-a btn-sm" onClick={()=>setShowForm(f=>!f)}>+ Добавить</button>
    </div>

    {showForm&&<div style={{background:'var(--surf)',border:'1px solid var(--border)',borderRadius:'var(--r2)',padding:'16px',marginBottom:'14px'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'12px',marginBottom:'10px'}}>
        <div className="fr" style={{marginBottom:0}}><label>Месяц</label>
          <select value={adMonth} onChange={e=>setAdMonth(e.target.value)}>
            {allRepairMonths.map(m=>{const[y,mo]=m.split('-');return<option key={m} value={m}>{MONTHS_FULL[parseInt(mo)-1]} {y}</option>;})}
          </select></div>
        <div className="fr" style={{marginBottom:0}}><label>Тип</label>
          <select value={adType} onChange={e=>setAdType(e.target.value)}>
            <option value="posting">Оплата объявления</option>
            <option value="promotion">Продвижение</option>
          </select></div>
        <div className="fr" style={{marginBottom:0}}><label>Сумма ₽</label>
          <input type="number" value={adAmount} onChange={e=>setAdAmount(e.target.value)} placeholder="0"/></div>
      </div>
      <div className="fr" style={{marginBottom:'12px'}}><label>Комментарий</label>
        <input value={adNote} onChange={e=>setAdNote(e.target.value)} placeholder="За что (необязательно)"/></div>
      <div style={{display:'flex',gap:'8px'}}>
        <button className="btn btn-a btn-sm" onClick={save}>Сохранить</button>
        <button className="btn btn-g btn-sm" onClick={()=>setShowForm(false)}>Отмена</button>
      </div>
    </div>}

    {!ads.length
      ?<div className="empty"><div className="empty-icon">📢</div><div className="empty-txt">Расходов пока нет</div></div>
      :<div>
        {/* Группировка по месяцам */}
        {[...new Set(ads.map(a=>a.month))].map(month=>{
          const monthAds=ads.filter(a=>a.month===month);
          const[y,mo]=month.split('-');
          const monthTotal=monthAds.reduce((s,a)=>s+(a.amount||0),0);
          return<div key={month} style={{marginBottom:'16px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border)',marginBottom:'8px'}}>
              <span style={{fontSize:'.8rem',fontWeight:700,color:'var(--t2)'}}>{MONTHS_FULL[parseInt(mo)-1]} {y}</span>
              <span style={{fontFamily:'var(--mono)',fontSize:'.85rem',color:'var(--warn)'}}>−{fmt(monthTotal)}</span>
            </div>
            {monthAds.map(a=><div key={a.id} style={{display:'flex',alignItems:'center',gap:'10px',padding:'8px 12px',background:'var(--surf)',borderRadius:'8px',marginBottom:'6px'}}>
              <span style={{fontSize:'.75rem',padding:'3px 8px',background:a.type==='posting'?'rgba(255,184,0,.12)':'rgba(79,184,255,.12)',color:a.type==='posting'?'var(--warn)':'var(--a3)',borderRadius:'4px',fontWeight:600,whiteSpace:'nowrap'}}>
                {a.type==='posting'?'📄 Объявление':'🚀 Продвижение'}
              </span>
              <span style={{flex:1,fontSize:'.85rem',color:'var(--t2)'}}>{a.note||'—'}</span>
              <span style={{fontFamily:'var(--mono)',fontSize:'.88rem',fontWeight:700,color:'var(--warn)'}}>−{fmt(a.amount)}</span>
              <button onClick={()=>delAd(a.id)} style={{background:'none',border:'none',color:'var(--t3)',cursor:'pointer',fontSize:'1rem',padding:'2px 4px'}} title="Удалить">✕</button>
            </div>)}
          </div>;
        })}
      </div>}
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
